spring:
  application:
    name: finstream-ai

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-haiku-4-5-20251001
          temperature: 0.3
          max-tokens: 1024
    ollama:
      base-url: http://localhost:11434
      chat:
        enabled: false
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        initialize-schema: true

  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: finstream_password
  data:
    neo4j:
      database: neo4j

  datasource:
    url: jdbc:postgresql://localhost:5433/finstream_vectorstore
    username: finstream_user
    password: finstream_password
    driver-class-name: org.postgresql.Driver

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: finstream-pipeline
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.finstream.domain"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  jpa:
    hibernate:
      ddl-auto: none

finstream:
  kafka:
    topics:
      raw-transactions: raw-transactions
      processed-transactions: processed-transactions

resilience4j:
  circuitbreaker:
    instances:
      graphAnomalyDetector:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 80
  retry:
    instances:
      graphAnomalyDetector:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,metrics
  health:
    circuitbreakers:
      enabled: true

server:
  port: 8081
  error:
    include-message: always
